name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI-only placeholders so Next can compile; real values live in Vercel / .env.local.
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.ci-placeholder
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_ci_placeholder
      PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_WHATSAPP_NUMBER: "2340000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
